# Host runs: `docker compose up -d` from this folder. That's the whole server.
services:
  blind-deaf-muted:
    build:
      context: .. # repo root, so the Dockerfile can reach :server + :common
      dockerfile: docker/Dockerfile
    # Once CI publishes a prebuilt image, the host can skip `build` entirely and use:
    #   image: ghcr.io/you/blind-deaf-muted-server:0.1.0
    container_name: blind-deaf-muted-server
    environment:
      EULA: "TRUE"
      # Mods our server needs, auto-downloaded from Modrinth (matched to the
      # FABRIC loader + 1.21.4 set in the Dockerfile). No local files needed:
      #   fabric-api        — our jar's hard dependency
      #   simple-voice-chat — provides the voice API our BlindDeafMutedVoicechatPlugin
      #                       enforces DEAF/MUTED against. Must also be installed
      #                       by every player on their client.
      # simple-voice-chat is PINNED to 2.5.36 to match the dev clients: Loom 1.9.2
      # can't load newer SVC builds (2.6.x built with Loom 1.17+), so the dev
      # clients run 2.5.36 (voice compat 18). The server auto-downloads "latest"
      # by default (2.6.20 = compat 20), which mismatches → "incompatible voice
      # chat version" and voice never connects. Pin both sides to the same build.
      # FOR PRODUCTION: drop the pin (use "simple-voice-chat") so server + players
      # all get the latest SVC.
      MODRINTH_PROJECTS: "fabric-api,simple-voice-chat:fabric-1.21.4-2.5.36"
      MODRINTH_DOWNLOAD_DEPENDENCIES: "required"
    ports:
      - "25565:25565" # share host IP:25565 with players (see DESIGN.md §2g)
      - "24454:24454/udp" # Simple Voice Chat voice traffic (UDP). REQUIRED, or
        # players connect but voice silently fails to start.
    volumes:
      - ./data:/data # persists the world + server files across restarts
    stdin_open: true
    tty: true
    restart: unless-stopped
