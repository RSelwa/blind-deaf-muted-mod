# Host runs: `docker compose up -d` from this folder. That's the whole server.
services:
  monkeys:
    build:
      context: ..            # repo root, so the Dockerfile can reach :server + :common
      dockerfile: docker/Dockerfile
    # Once CI publishes a prebuilt image, the host can skip `build` entirely and use:
    #   image: ghcr.io/you/monkeys-server:0.1.0
    container_name: monkeys-server
    environment:
      EULA: "TRUE"
      # Fabric API is a separate mod our server jar depends on. The itzg image
      # auto-downloads it from Modrinth, matching the FABRIC loader + 1.21.4
      # already set in the Dockerfile. No local files needed.
      MODRINTH_PROJECTS: "fabric-api"
      MODRINTH_DOWNLOAD_DEPENDENCIES: "required"
    ports:
      - "25565:25565"        # share host IP:25565 with players (see DESIGN.md §2g)
    volumes:
      - ./world:/data        # persists the world + server files across restarts
    stdin_open: true
    tty: true
    restart: unless-stopped
