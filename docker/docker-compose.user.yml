# ─────────────────────────────────────────────────────────────────────────────
# USER-FACING compose file — this is the ONLY file you hand to people who want to
# host the server. They do NOT need the repo, Gradle, Java, or any jar.
#
#   1. Put this file in an empty folder.
#   2. Run:  docker compose -f docker-compose.user.yml up -d
#
# Docker pulls the prebuilt image (your mod jar is already baked inside it at
# /mods/server.jar) and starts the server. That's the whole setup.
#
# (The build-from-source compose used during development is docker-compose.yml.)
# ─────────────────────────────────────────────────────────────────────────────
services:
  monkeys:
    # Prebuilt image published by CI to GitHub Container Registry. No `build:`
    # block on purpose — nothing is compiled on the host, the image is just pulled.
    # Pin to a version that matches the client modpack players install (version
    # lock-step — see DESIGN.md §2f). Use :latest only if you accept auto-updates.
    image: ghcr.io/rselwa/monkeys-server:0.1.0
    container_name: blind-deaf-muted-server
    environment:
      EULA: "TRUE"
      # Third-party mods the server pulls at runtime from Modrinth (our own jar is
      # already in the image). Versions resolve against the FABRIC loader + 1.21.4
      # baked into the image.
      #   fabric-api        — our jar's hard dependency
      #   simple-voice-chat — provides the voice API our plugin enforces DEAF/MUTED
      #                       against; every player must also install it client-side.
      MODRINTH_PROJECTS: "fabric-api,simple-voice-chat"
      MODRINTH_DOWNLOAD_DEPENDENCIES: "required"
    ports:
      - "25565:25565" # share host IP:25565 with players (see DESIGN.md §2g)
      - "24454:24454/udp" # Simple Voice Chat voice traffic (UDP). REQUIRED, or
        # players connect but voice silently fails to start.
    volumes:
      - ./data:/data # persists the world + server files across restarts
    stdin_open: true
    tty: true
    restart: unless-stopped
