# Builds the server Docker image and pushes it to GitHub Container Registry (GHCR).
#
# Trigger: push a version tag, e.g.
#     git tag v0.1.0 && git push origin v0.1.0
#
# The image is built FROM docker/Dockerfile (multi-stage: compiles the server jar,
# then bakes it into /mods/server.jar of the itzg/minecraft-server image). The
# result is published so hosts can pull it via docker-compose.user.yml — they never
# need the repo. Keep the image tag in lock-step with the client modpack version.
name: Publish server image

on:
  push:
    tags:
      - "v*" # v0.1.0, v1.2.3, ...
  workflow_dispatch: # allow manual runs from the Actions tab

env:
  REGISTRY: ghcr.io
  # Image name MUST be lowercase for GHCR.
  IMAGE_NAME: rselwa/blind-deaf-muted-server

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push to GHCR with GITHUB_TOKEN
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # From tag v0.1.0 this produces:  0.1.0, 0.1, and latest.
          # The `latest` tag is added automatically by metadata-action's default
          # `latest=auto` flavor for semver tags (don't gate it on a branch — a tag
          # push isn't on a branch, so a branch-condition would never fire it).
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: . # repo root, so the Dockerfile reaches :server + :common
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
